name: test-nodata

on: [push, pull_request, workflow_dispatch]

env:
  HOMEBREW_DISPLAY_INSTALL_TIMES: "ON"
  HOMEBREW_NO_ANALYTICS: "ON"
  HOMEBREW_NO_AUTO_UPDATE: "ON"
  HOMEBREW_NO_BOTTLE_SOURCE_FALLBACK: "ON"
  HOMEBREW_NO_GITHUB_API: "ON"
  HOMEBREW_NO_INSTALL_CLEANUP: "ON"

jobs:
  test-nodata:
    name: ${{ matrix.os }}, gfortran
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packages (ubuntu)
        if: contains(matrix.os,'ubuntu')
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc gfortran numdiff
          echo "CC=gcc" >> "$GITHUB_ENV"
          echo "FC=gfortran" >> "$GITHUB_ENV"
          echo "BUILD_TYPE=Debug" >> "$GITHUB_ENV"

      - name: Install packages (macOS)
        if: contains(matrix.os,'macos')
        run: |
          brew install gcc numdiff || brew upgrade gcc numdiff || true
          # Homebrew gcc installs versioned binaries (gfortran-14, ...); fall
          # back to the unversioned symlink if the glob finds nothing. Use the
          # system clang for C (the standard macOS + Homebrew-gfortran combo).
          fc=$(ls "$(brew --prefix)"/bin/gfortran-* 2>/dev/null | sort -V | tail -n1)
          echo "CC=clang" >> "$GITHUB_ENV"
          echo "FC=${fc:-gfortran}" >> "$GITHUB_ENV"
          # Release on macOS: the Debug build's -ffpe-trap/-Og/-fcheck crashes
          # (SIGBUS) on Apple Silicon with recent gfortran; Release isolates
          # whether that is a debug-flag artifact or a genuine runtime bug.
          echo "BUILD_TYPE=Release" >> "$GITHUB_ENV"

      - name: Build
        run: |
          cmake -Bbuild -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE="$BUILD_TYPE" -Wno-dev -DCMAKE_C_COMPILER="$CC" -DCMAKE_Fortran_COMPILER="$FC"
          cmake --build build/ --target all
          cd build
          ctest -L nodata --output-on-failure
